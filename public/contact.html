<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Settled</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d17; color: #e2e8f0; font-family: -apple-system, 'DM Sans', 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
  .card { background: #12122a; border: 1px solid #1e1e3a; border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 480px; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo-icon { font-size: 28px; color: #6366f1; margin-bottom: 8px; }
  .logo-text { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  h1 { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: #64748b; margin-bottom: 28px; line-height: 1.6; }
  label { display: block; font-size: 12px; color: #64748b; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 6px; }
  input, textarea, select { width: 100%; background: #0d0d17; border: 1px solid #1e1e3a; border-radius: 10px; padding: 12px 14px; color: #e2e8f0; font-size: 15px; font-family: inherit; margin-bottom: 16px; outline: none; transition: border-color 0.2s; }
  input:focus, textarea:focus, select:focus { border-color: #6366f1; }
  textarea { resize: vertical; min-height: 120px; }
  select { appearance: none; cursor: pointer; }
  option { background: #12122a; }
  .btn { width: 100%; background: #6366f1; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; margin-top: 4px; }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .back { display: inline-flex; align-items: center; gap: 6px; color: #475569; font-size: 14px; text-decoration: none; margin-bottom: 24px; transition: color 0.2s; }
  .back:hover { color: #fff; }
  .success { display: none; text-align: center; padding: 16px 0; }
  .success-icon { font-size: 48px; margin-bottom: 16px; }
  .success h2 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .success p { font-size: 14px; color: #64748b; line-height: 1.6; }
  .error-msg { background: #f43f5e15; border: 1px solid #f43f5e40; border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #f43f5e; margin-bottom: 16px; display: none; }
  .footer { margin-top: 24px; text-align: center; font-size: 12px; color: #334155; }
  .footer a { color: #475569; text-decoration: none; }
</style>
</head>
<body>

<div style="width:100%;max-width:480px">
  <a href="/" class="back">← Back to Settled</a>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div class="logo-text">Settled</div>
    </div>

    <div id="form-container">
      <h1>Get in touch</h1>
      <p class="subtitle">Have a question, feedback, or need help? We'll get back to you within 24 hours.</p>

      <div class="error-msg" id="error-msg"></div>

      <label>Your name</label>
      <input type="text" id="name" placeholder="Your name" required />

      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com" required />

      <label>What's this about?</label>
      <select id="subject">
        <option value="General question">General question</option>
        <option value="Billing or payment">Billing or payment</option>
        <option value="Something isn't working">Something isn't working</option>
        <option value="Feedback or suggestion">Feedback or suggestion</option>
        <option value="Other">Something else</option>
      </select>

      <label>Message</label>
      <textarea id="message" placeholder="How can we help?"></textarea>

      <button class="btn" id="submit-btn" onclick="submitForm()">Send message →</button>
    </div>

    <div class="success" id="success-msg">
      <div class="success-icon">✅</div>
      <h2>Message sent!</h2>
      <p>Thanks for getting in touch. We'll get back to you within 24 hours.</p>
      <a href="/" style="display:inline-block;margin-top:20px;background:#6366f1;color:#fff;border-radius:10px;padding:12px 24px;font-size:14px;font-weight:600;text-decoration:none">Back to Settled</a>
    </div>
  </div>

  <div class="footer">
    <a href="/privacy.html">Privacy Policy</a> · <a href="/terms.html">Terms & Conditions</a>
  </div>
</div>

<script>
  async function submitForm() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const subject = document.getElementById('subject').value;
    const message = document.getElementById('message').value.trim();
    const btn = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');

    errorMsg.style.display = 'none';

    if (!name || !email || !message) {
      errorMsg.textContent = 'Please fill in your name, email, and message.';
      errorMsg.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      const response = await fetch('https://ygmhcyeedvyqyzhlsafu.supabase.co/functions/v1/contact-form', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, subject, message })
      });

      const data = await response.json();

      if (response.ok && data.success) {
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
      } else {
        throw new Error('Failed');
      }
    } catch {
      btn.disabled = false;
      btn.textContent = 'Send message →';
      errorMsg.textContent = 'Something went wrong. Please email hello@settlednow.co.uk directly.';
      errorMsg.style.display = 'block';
    }
  }
</script>

</body>
</html>
